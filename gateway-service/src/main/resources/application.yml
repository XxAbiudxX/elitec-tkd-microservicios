server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    # ESTO ES LO QUE FALTA:
    register-with-eureka: true
    fetch-registry: true

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*" 
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          # CAMBIO AQUÍ: Prueba ponerlo en minúsculas si en Eureka sale así, o viceversa
          uri: lb://auth-service 
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1