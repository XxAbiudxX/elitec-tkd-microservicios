spring:
  cloud:
    gateway:
      globalcors:
        # Esto obliga a que el filtro se aplique antes que cualquier otra cosa
        add-to-simple-url-handler-mapping: true 
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "https://elitec-tkd-microservicios.vercel.app"
              - "http://127.0.0.1:5500"
              - "http://localhost:5500"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: 
              - "Content-Type"
              - "Authorization"
              - "X-Requested-With"
              - "Accept"
              - "Origin"
            allowCredentials: true