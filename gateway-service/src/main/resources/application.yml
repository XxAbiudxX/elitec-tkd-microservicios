server:
  port: 8080

eureka:
  client:
    register-with-eureka: true # <-- Agrégale esto
    fetch-registry: true      # <-- Y esto también
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            # Permitimos tu link de Vercel y el Live Server para evitar el error rojo de CORS
            allowedOriginPatterns: "*" 
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true # Importante para que coincida con Eureka
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1 # IMPORTANTE: Quita "/api" para que al Auth le llegue solo "/auth/login"

        - id: student-service
          uri: lb://STUDENT-SERVICE
          predicates:
            - Path=/api/alumnos/**
          filters:
            - StripPrefix=1

        - id: attendance-service
          uri: lb://ATTENDANCE-SERVICE
          predicates:
            - Path=/api/attendance/**
          filters:
            - StripPrefix=1