spring:
  cloud:
    gateway:
      globalcors:
        # Esto obliga a que el filtro se aplique antes que cualquier otra cosa
        add-to-simple-url-handler-mapping: true 
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "https://elitec-tkd-microservicios.vercel.app"
              - "http://127.0.0.1:5500"
              - "http://localhost:5500"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: 
              - "Content-Type"
              - "Authorization"
              - "X-Requested-With"
              - "Accept"
              - "Origin"
            allowCredentials: true
      # --- AQUÍ EMPIEZAN LAS RUTAS (Al mismo nivel que globalcors) ---
      routes:
        - id: auth-service
          uri: https://auth-service-production-XXXX.up.railway.app
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1  # Mantiene el /api/auth para que Java lo reconozca