<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elitec TKD - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #dc3545 0%, #212529 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h1 class="text-danger mb-4"><i class="bi bi-yin-yang"></i> Elitec TKD</h1>
        <form id="loginForm">
            <div class="mb-3 text-start"><label class="form-label fw-bold">Correo</label><input type="email" id="email" class="form-control" required></div>
            <div class="mb-4 text-start"><label class="form-label fw-bold">Contraseña</label><input type="password" id="password" class="form-control" required></div>
            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold shadow-sm">ENTRAR AL DOJO</button>
        </form>
        <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
    </div>
    <script src="login.js"></script>
</body>
</html>
