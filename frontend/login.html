<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Elitec TKD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: 80px auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card shadow-lg border-0 login-container">
            <div class="card-body p-5 text-center">
                <h1 class="display-1 text-danger mb-3"><i class="bi bi-yin-yang"></i></h1>
                <h3 class="fw-bold mb-1">Elitec TKD</h3>
                
                <ul class="nav nav-tabs justify-content-center mt-4 mb-3" id="authTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active text-danger fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">Ingresar</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link text-secondary" id="register-tab" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">Crear Cuenta</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="login-pane" role="tabpanel">
                        <form id="formLogin">
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="loginEmail" value="admin@elitec.pe" required>
                                <label>Correo Electrónico</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="loginPassword" value="admin123" required>
                                <label>Contraseña</label>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 py-2" id="btnLogin">Entrar al Dojo</button>
                            <div id="loginError" class="text-danger mt-2 small" style="display: none;">Credenciales incorrectas o servidor apagado.</div>
                        </form>
                    </div>

                    <div class="tab-pane fade" id="register-pane" role="tabpanel">
                        <form id="formRegistro">
    <div class="form-floating mb-3">
        <input type="text" class="form-control" id="regNombre" placeholder="Nombre" required>
        <label>Nombre</label>
    </div>
    
    <div class="form-floating mb-3">
        <input type="text" class="form-control" id="regApellido" placeholder="Apellido" required>
        <label>Apellido</label>
    </div>

    <div class="form-floating mb-3">
        <input type="email" class="form-control" id="regEmail" placeholder="Correo" required>
        <label>Correo</label>
    </div>
    
    <div class="form-floating mb-3">
        <input type="password" class="form-control" id="regPassword" placeholder="Contraseña" required>
        <label>Contraseña</label>
    </div>
    
    <button type="submit" class="btn btn-dark w-100 py-2" id="btnRegister">Registrar Administrador</button>
</form>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js"></script>
</body>
</html>
