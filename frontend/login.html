<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitec TKD - Sistema de Gestión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root { --tkd-red: #dc3545; --tkd-blue: #0d6efd; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .navbar { border-bottom: 4px solid rgba(0,0,0,0.1); }
        .content-panel { display: none; animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-hover { transition: 0.3s; border: none; cursor: pointer; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .nav-tabs .nav-link.active { font-weight: bold; color: var(--tkd-red); border-bottom: 3px solid var(--tkd-red); }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#" onclick="mostrarSeccion('inicio')">
                <i class="bi bi-yin-yang"></i> ELITEC TKD
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="mostrarSeccion('inicio')">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="mostrarSeccion('alumnos')">🥋 Alumnos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="mostrarSeccion('sedes')">🏛️ Sedes</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a class="text-white text-decoration-none small" href="#" data-bs-toggle="modal" data-bs-target="#modalPerfil" onclick="cargarDatosPerfil()">
                        <i class="bi bi-person-circle"></i> Mi Perfil
                    </a>
                    <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Salir <i class="bi bi-box-arrow-right"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        
        <div id="content-inicio" class="content-panel" style="display: block;">
            <div class="row g-4 text-center">
                <div class="col-12">
                    <div class="p-5 bg-white shadow-sm rounded-4 border-start border-danger border-5 mb-4 text-start">
                        <h2 class="fw-bold">Panel del Sensei 🥋</h2>
                        <p class="text-muted mb-0">Bienvenido al sistema de control de Elitec Taekwondo.</p>
                    </div>
                </div>
                <div class="col-md-6" onclick="mostrarSeccion('alumnos')">
                    <div class="card h-100 p-5 shadow-sm card-hover border-primary text-primary">
                        <i class="bi bi-people-fill display-1 mb-3"></i>
                        <h3>Gestión de Alumnos</h3>
                    </div>
                </div>
                <div class="col-md-6" onclick="mostrarSeccion('sedes')">
                    <div class="card h-100 p-5 shadow-sm card-hover border-danger text-danger">
                        <i class="bi bi-building-fill display-1 mb-3"></i>
                        <h3>Control de Sedes</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-alumnos" class="content-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Listado de Alumnos</h2>
                <button class="btn btn-primary shadow" data-bs-toggle="modal" data-bs-target="#modalAlumno">
                    <i class="bi bi-plus-lg"></i> Nuevo Alumno
                </button>
            </div>
            <div id="students-list" class="row g-4"></div>
        </div>

        <div id="content-sedes" class="content-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Sedes</h2>
                <div id="sedes-list" class="row g-4"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAlumno" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold"><i class="bi bi-person-plus"></i> Nueva Matrícula</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formAlumno">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label fw-bold">Nombre</label><input type="text" id="a_nombre" class="form-control" required></div>
                            <div class="col-md-6"><label class="form-label fw-bold">Apellido</label><input type="text" id="a_apellido" class="form-control" required></div>
                            <div class="col-md-4"><label class="form-label fw-bold">DNI</label><input type="text" id="a_dni" class="form-control"></div>
                            <div class="col-md-4"><label class="form-label fw-bold">Teléfono</label><input type="text" id="a_telefono" class="form-control"></div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Cinta</label>
                                <select id="a_cinta" class="form-select">
                                    <option value="Blanca">Blanca</option><option value="Amarilla">Amarilla</option>
                                    <option value="Verde">Verde</option><option value="Azul">Azul</option>
                                    <option value="Roja">Roja</option><option value="Negra">Negra</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="form-label fw-bold">Correo</label><input type="email" id="a_email" class="form-control"></div>
                            <div class="col-12"><label class="form-label fw-bold">Dirección</label><input type="text" id="a_direccion" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label fw-bold">F. Nacimiento</label><input type="date" id="a_fechaNac" class="form-control"></div>
                            <div class="col-md-6"><label class="form-label fw-bold">F. Ingreso</label><input type="date" id="a_fechaIngreso" class="form-control"></div>
                        </div>
                        <button type="button" class="btn btn-primary w-100 py-3 mt-4 fw-bold" onclick="guardarAlumno()">REGISTRAR EN EL DOJO</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content shadow-lg border-0">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title fw-bold"><i class="bi bi-person-vcard"></i> Gestión de Alumno</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul class="nav nav-tabs px-3 pt-3 bg-light" id="tabAlumno" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-datos" type="button">Ficha y Edición</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-asistencia" type="button">Asistencias</button>
                        </li>
                    </ul>
                    <div class="tab-content p-4">
                        <div class="tab-pane fade show active" id="tab-datos">
                            <form id="formEdicion">
                                <input type="hidden" id="edit_id">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-bold">Nombre</label><input type="text" id="edit_nombre" class="form-control"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">Apellido</label><input type="text" id="edit_apellido" class="form-control"></div>
                                    <div class="col-md-4"><label class="form-label fw-bold">DNI</label><input type="text" id="edit_dni" class="form-control" readonly></div>
                                    <div class="col-md-4"><label class="form-label fw-bold">Teléfono</label><input type="text" id="edit_telefono" class="form-control"></div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Cinta</label>
                                        <select id="edit_cinta" class="form-select">
                                            <option value="Blanca">Blanca</option><option value="Amarilla">Amarilla</option>
                                            <option value="Verde">Verde</option><option value="Azul">Azul</option>
                                            <option value="Roja">Roja</option><option value="Negra">Negra</option>
                                        </select>
                                    </div>
                                    <div class="col-12"><label class="form-label fw-bold">Correo</label><input type="email" id="edit_correo" class="form-control"></div>
                                    <div class="col-12"><label class="form-label fw-bold">Dirección</label><input type="text" id="edit_direccion" class="form-control"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold">Fecha Ingreso</label><input type="date" id="edit_ingreso" class="form-control"></div>
                                </div>
                                <div class="d-flex gap-2 mt-4 pt-3 border-top">
                                    <button type="button" class="btn btn-warning w-100 fw-bold" onclick="actualizarAlumno()">GUARDAR CAMBIOS</button>
                                    <button type="button" class="btn btn-outline-danger" onclick="eliminarAlumnoDesdeFicha()">ELIMINAR ALUMNO</button>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="tab-asistencia">
                            <div class="text-center py-5">
                                <button class="btn btn-success btn-lg px-5 shadow mb-4" onclick="marcarAsistencia()">
                                    <i class="bi bi-calendar-check-fill"></i> MARCAR ASISTENCIA HOY
                                </button>
                                <div id="historial-asistencia" class="text-muted mt-3">Historial vacío por ahora.</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
