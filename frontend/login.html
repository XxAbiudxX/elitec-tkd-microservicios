<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elitec TKD - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #dc3545 0%, #212529 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #333; }
        .login-card { width: 100%; max-width: 400px; background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .btn-tkd { background: #dc3545; color: white; border: none; font-weight: bold; transition: 0.3s; }
        .btn-tkd:hover { background: #bb2d3b; transform: scale(1.02); }
        .toggle-link { cursor: pointer; color: #dc3545; text-decoration: underline; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <h1 class="text-danger"><i class="bi bi-yin-yang"></i></h1>
            <h2 class="fw-bold" id="auth-title">Elitec TKD</h2>
            <p class="text-muted small" id="auth-subtitle">Ingresa al Dojo</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Correo</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-tkd w-100 py-2">ENTRAR AL DOJO</button>
        </form>

        <form id="registerForm" class="hidden">
            <div class="mb-3">
                <label class="form-label small fw-bold">Nombre Completo</label>
                <input type="text" id="reg-nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Correo</label>
                <input type="email" id="reg-email" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Contraseña</label>
                <input type="password" id="reg-password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 py-2">CREAR CUENTA SENSEI</button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
            <p class="small mb-0" id="toggle-text">¿Eres nuevo Sensei? <span class="toggle-link" onclick="toggleAuth()">Regístrate</span></p>
        </div>
        <div id="auth-error" class="alert alert-danger mt-3 d-none small"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>
