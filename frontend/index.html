<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Elitec TKD - Redireccionando...</title>
    <style>
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #dc3545; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        // LÓGICA DE ENRUTAMIENTO INICIAL
        window.onload = function() {
            const token = localStorage.getItem('jwtToken');
            if (token) {
                // Si ya está logueado, al Tablero
                window.location.href = 'dashboard.html';
            } else {
                // Si no, a identificarse
                window.location.href = 'login.html';
            }
        };
    </script>
</head>
<body>
    <div class="loader"></div>
</body>
</html>
