<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitec TKD - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .content-panel { display: none; }
        .card-hover:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.3s; }
        .dato-perfil { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#" onclick="mostrarSeccion('inicio')"><i class="bi bi-yin-yang"></i> Elitec TKD</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="#" onclick="mostrarSeccion('inicio')">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="mostrarSeccion('alumnos')">🥋 Alumnos</a></li>
                </ul>
                <button class="btn btn-outline-light btn-sm" onclick="cerrarSesion()">Salir <i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="content-inicio" class="content-panel" style="display: block;">
            <div class="row g-4 mt-2">
                <div class="col-md-6" onclick="mostrarSeccion('alumnos')" style="cursor: pointer;">
                    <div class="card p-5 h-100 shadow-sm card-hover border-primary text-center text-primary">
                        <i class="bi bi-people-fill display-2 mb-3"></i>
                        <h3>Gestión de Alumnos</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-alumnos" class="content-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Listado de Alumnos</h2>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalAlumno">Nueva Matrícula</button>
            </div>
            <div id="students-list" class="row g-4"></div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title">Gestión de Alumno</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul class="nav nav-tabs px-3 pt-3 bg-light" id="tabAlumno" role="tablist">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-datos">Edición</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-asistencia">Asistencia</button></li>
                    </ul>
                    <div class="tab-content p-4">
                        <div class="tab-pane fade show active" id="tab-datos">
                            <form id="formEdicion">
                                <input type="hidden" id="edit_id">
                                <div class="row g-3">
                                    <div class="col-md-6"><label class="form-label fw-bold small">Nombre</label><input type="text" id="edit_nombre" class="form-control"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold small">Apellido</label><input type="text" id="edit_apellido" class="form-control"></div>
                                    <div class="col-md-6"><label class="form-label fw-bold small">DNI</label><input type="text" id="edit_dni" class="form-control" readonly></div>
                                    <div class="col-md-6"><label class="form-label fw-bold small">Cinta</label>
                                        <select id="edit_cinta" class="form-select">
                                            <option value="Blanca">Blanca</option><option value="Roja">Roja</option><option value="Negra">Negra</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-4 pt-3 border-top">
                                    <button type="button" class="btn btn-warning w-100 fw-bold" onclick="actualizarAlumno()">GUARDAR</button>
                                    <button type="button" class="btn btn-danger" onclick="eliminarAlumnoDesdeFicha()">ELIMINAR</button>
                                </div>
                            </form>
                        </div>
                        <div class="tab-pane fade" id="tab-asistencia">
                            <div class="text-center py-4">
                                <button class="btn btn-success btn-lg px-5 shadow-sm" onclick="marcarAsistencia()">MARCAR PRESENTE HOY</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
