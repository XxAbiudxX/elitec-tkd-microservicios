<div class="modal fade" id="modalDetalle" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title"><i class="bi bi-person-badge"></i> Gestión de Alumno</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul class="nav nav-tabs mb-3" id="tabAlumno" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="datos-tab" data-bs-toggle="tab" data-bs-target="#tab-datos" type="button"><i class="bi bi-card-list"></i> Ficha y Edición</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="asistencia-tab" data-bs-toggle="tab" data-bs-target="#tab-asistencia" type="button"><i class="bi bi-calendar-check"></i> Asistencia</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="tabAlumnoContent">
                        <div class="tab-pane fade show active" id="tab-datos" role="tabpanel">
                            <form id="formEdicionAlumno">
                                <input type="hidden" id="edit_id">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Nombre</label>
                                        <input type="text" id="edit_nombre" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Apellido</label>
                                        <input type="text" id="edit_apellido" class="form-control">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">DNI (Único)</label>
                                        <input type="text" id="edit_dni" class="form-control" readonly>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Teléfono</label>
                                        <input type="text" id="edit_telefono" class="form-control">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold">Cinta Actual</label>
                                        <select id="edit_cinta" class="form-select">
                                            <option value="Blanca">Blanca</option>
                                            <option value="Amarilla">Amarilla</option>
                                            <option value="Verde">Verde</option>
                                            <option value="Azul">Azul</option>
                                            <option value="Roja">Roja</option>
                                            <option value="Negra">Negra</option>
                                        </select>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold">Dirección</label>
                                        <input type="text" id="edit_direccion" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Correo</label>
                                        <input type="email" id="edit_correo" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold">Fecha Ingreso</label>
                                        <input type="date" id="edit_ingreso" class="form-control">
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-4 pt-3 border-top">
                                    <button type="button" class="btn btn-warning w-100 fw-bold" onclick="actualizarAlumno()">
                                        <i class="bi bi-arrow-repeat"></i> Guardar Cambios
                                    </button>
                                    <button type="button" class="btn btn-outline-danger" onclick="eliminarAlumnoDesdeFicha()">
                                        <i class="bi bi-trash"></i> Eliminar Alumno
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="tab-asistencia" role="tabpanel">
                            <div class="text-center py-4">
                                <h5 class="mb-3">Registro de Clases</h5>
                                <button class="btn btn-success btn-lg shadow-sm" onclick="marcarAsistencia()">
                                    <i class="bi bi-check-circle-fill"></i> Marcar Asistencia Hoy
                                </button>
                                <hr>
                                <div class="p-3 bg-light rounded border">
                                    <p class="text-muted small mb-0"><i class="bi bi-info-circle"></i> Aquí aparecerá el historial de clases del alumno una vez conectado al servicio de asistencias.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
