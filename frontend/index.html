<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elitec TKD - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --sidebar-width: 250px; --tkd-red: #dc3545; }
        body { background-color: #1a1a1a; color: white; } /* Fondo oscuro como en tu foto */
        
        /* Sidebar Estilo Profesional */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; background: #212529; border-right: 1px solid #333; }
        .main-content { margin-left: var(--sidebar-width); padding: 30px; }
        
        .nav-link { color: #adb5bd; padding: 12px 20px; border-radius: 8px; margin: 5px 15px; }
        .nav-link:hover, .nav-link.active { background: var(--tkd-red); color: white; }
        
        .card-tkd { background: #2b2b2b; border: 1px solid #3d3d3d; border-radius: 12px; color: white; }
        .btn-tkd { background: #ff8c00; border: none; color: white; font-weight: bold; } /* Color naranja de tus botones */
        .content-section { display: none; }
        .content-section.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar d-flex flex-column p-3">
        <h4 class="text-center fw-bold mb-5"><i class="bi bi-yin-yang text-danger"></i> Elitec TKD</h4>
        <nav class="nav flex-column">
            <a class="nav-link active" href="#" onclick="switchTab('inicio', this)"><i class="bi bi-grid-fill"></i> Mi Tablero</a>
            <a class="nav-link" href="#" onclick="switchTab('alumnos', this)"><i class="bi bi-people-fill"></i> Mis Cursos / Alumnos</a>
            <a class="nav-link" href="#" onclick="switchTab('sedes', this)"><i class="bi bi-building"></i> Sedes</a>
            <a class="nav-link text-warning" href="#" onclick="switchTab('perfil', this)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-3">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Salir <i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>

    <div class="main-content">
        
        <section id="sec-inicio" class="content-section active">
            <div class="alert card-tkd p-4">
                <h4><i class="bi bi-check-circle-fill text-success"></i> Estado del Dojo</h4>
                <p class="mb-0">Bienvenido Sensei. El sistema está sincronizado.</p>
            </div>
            </section>

        <section id="sec-alumnos" class="content-section">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Gestión de Alumnos</h2>
                <button class="btn btn-tkd" data-bs-toggle="modal" data-bs-target="#modalAlumno">+ Nuevo Alumno</button>
            </div>
            <div id="students-list" class="row g-4">
                </div>
        </section>

        <section id="sec-sedes" class="content-section">
            <h2 class="fw-bold">Sedes Universitarias</h2>
            <div id="sedes-list" class="row g-4"></div>
        </section>

        <section id="sec-perfil" class="content-section">
            <div class="card-tkd p-4">
                <div class="row">
                    <div class="col-md-2 text-center">
                        <img src="https://via.placeholder.com/150" class="rounded-circle img-thumbnail" id="perfil-img">
                    </div>
                    <div class="col-md-10">
                        <h2 id="p-nombre">Nombre del Sensei</h2>
                        <span class="badge bg-danger">Ciencias de la Comunicación</span>
                    </div>
                </div>
                <hr class="border-secondary">
                <div class="row mt-4" id="perfil-data">
                    </div>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
