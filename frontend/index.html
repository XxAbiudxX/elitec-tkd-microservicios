<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elitec TKD - Sensei Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold text-danger"><i class="bi bi-yin-yang"></i> Elitec TKD</h4>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link active" href="#" onclick="switchTab('inicio', this)"><i class="bi bi-speedometer2"></i> Mi Tablero</a>
            <a class="nav-link" href="#" onclick="switchTab('alumnos', this)"><i class="bi bi-people"></i> Alumnos</a>
            <a class="nav-link" href="#" onclick="switchTab('sedes', this)"><i class="bi bi-geo-alt"></i> Sedes</a>
            <a class="nav-link text-warning" href="#" onclick="switchTab('perfil', this)"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-4">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <button class="btn btn-danger d-lg-none position-fixed top-0 start-0 m-2 z-3" onclick="document.getElementById('sidebar').classList.toggle('active')">
        <i class="bi bi-list"></i>
    </button>

    <div class="main-content">
        
        <section id="sec-inicio" class="section-content active">
            <h2 class="fw-bold mb-4">Mi Tablero</h2>
            <div class="alert card-tkd border-start border-success border-4">
                <h5 class="text-success fw-bold"><i class="bi bi-shield-check"></i> Sistema Online</h5>
                <p class="mb-0 small text-gray">Bienvenido, Sensei. Todos los servicios de Railway están activos.</p>
            </div>
            <div class="row g-4 mt-2">
                <div class="col-md-4">
                    <div class="card-tkd text-center p-4">
                        <h1 id="count-alumnos" class="display-4 fw-bold text-primary">0</h1>
                        <p class="text-muted">Alumnos Activos</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="sec-alumnos" class="section-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Gestión de Alumnos</h2>
                <button class="btn btn-tkd w-auto" data-bs-toggle="modal" data-bs-target="#modalAlumno">+ Nueva Matrícula</button>
            </div>
            <div id="students-list" class="row g-4">
                </div>
        </section>

        <section id="sec-sedes" class="section-content">
            <h2 class="fw-bold mb-4">Sedes / Dojos</h2>
            <div id="sedes-list" class="row g-4">
                </div>
        </section>

        <section id="sec-perfil" class="section-content">
            <div class="card-tkd p-0 overflow-hidden">
                <div class="bg-danger p-4 d-flex align-items-center gap-4">
                    <div class="bg-white rounded-circle p-1 shadow">
                        <img src="https://ui-avatars.com/api/?name=Sensei+TKD&background=random" class="rounded-circle" width="100">
                    </div>
                    <div>
                        <h2 class="mb-0 fw-bold" id="p-nombre-header">Cargando...</h2>
                        <span class="badge bg-dark">Grado: Cinturón Negro</span>
                    </div>
                </div>
                <div class="p-4 row" id="perfil-data-grid">
                    </div>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
