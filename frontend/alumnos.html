<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="security.js"></script> <title>Elitec TKD - Gestión de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold text-danger"><i class="bi bi-yin-yang"></i> Elitec TKD</h4>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Inicio</a>
            <a class="nav-link active" href="alumnos.html"><i class="bi bi-people"></i> Gestión Alumnos</a>
            <a class="nav-link" href="sedes.html"><i class="bi bi-geo-alt"></i> Sedes</a>
            <a class="nav-link" href="horarios.html"><i class="bi bi-calendar3"></i> Mis Horarios</a>
            <a class="nav-link text-warning" href="perfil.html"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-4 border-top border-secondary">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-white">Base de Datos de Alumnos</h2>
            <button class="btn btn-tkd w-auto px-4" data-bs-toggle="modal" data-bs-target="#modalAlumno">
                <i class="bi bi-person-plus-fill"></i> + Nueva Matrícula
            </button>
        </div>

        <div class="card-tkd p-3 mb-4 shadow">
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0 text-muted"><i class="bi bi-search"></i></span>
                <input type="text" id="inputBusqueda" class="form-control bg-transparent border-0 text-white" 
                       placeholder="Buscar por DNI, Nombre o Apellido..." oninput="filtrarAlumnos(this.value)">
            </div>
        </div>

        <div id="students-list" class="row g-4">
            <div class="text-center mt-5"><div class="spinner-border text-danger"></div></div>
        </div>
    </div>

    <div class="modal fade" id="modalAlumno" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold">🥋 Ficha del Alumno</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formAlumno">
                        <input type="hidden" id="edit_id">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="small text-muted">Nombre</label><input type="text" id="a_nombre" class="form-control bg-secondary border-0 text-white" required></div>
                            <div class="col-md-6"><label class="small text-muted">Apellido</label><input type="text" id="a_apellido" class="form-control bg-secondary border-0 text-white" required></div>
                            <div class="col-md-6"><label class="small text-muted">DNI</label><input type="text" id="a_dni" class="form-control bg-secondary border-0 text-white"></div>
                            <div class="col-md-6">
                                <label class="small text-muted">Cinta</label>
                                <select id="a_cinta" class="form-select bg-secondary border-0 text-white">
                                    <option value="Blanca">Blanca</option><option value="Amarilla">Amarilla</option><option value="Verde">Verde</option>
                                    <option value="Azul">Azul</option><option value="Roja">Roja</option><option value="Negra">Negra</option>
                                </select>
                            </div>
                            <div class="col-12"><label class="small text-muted">Correo</label><input type="email" id="a_email" class="form-control bg-secondary border-0 text-white"></div>
                            <div class="col-12"><label class="small text-muted">Dirección</label><input type="text" id="a_direccion" class="form-control bg-secondary border-0 text-white"></div>
                        </div>
                        <button type="button" class="btn btn-tkd w-100 mt-4 py-3 fw-bold" onclick="guardarAlumno()">GUARDAR EN LA NUBE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app-alumnos.js"></script> 
</body>
</html>
