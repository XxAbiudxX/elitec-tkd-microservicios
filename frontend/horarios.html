<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="security.js"></script>
    <title>Elitec TKD - Horarios y Clases</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold text-danger"><i class="bi bi-yin-yang"></i> Elitec TKD</h4>
        </div>
        <nav class="nav flex-column mt-2" id="nav-container">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Inicio</a>
            <a class="nav-link active" href="horarios.html"><i class="bi bi-calendar3"></i> Mis Horarios</a>
            <a class="nav-link text-warning" href="perfil.html"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-4 border-top border-secondary">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <h2 class="fw-bold text-white mb-4">Cronograma de Entrenamiento</h2>

        <div id="admin-controls" class="card-tkd p-4 mb-4 border-start border-orange border-4 d-none">
            <h5 class="text-orange fw-bold mb-3">Asignar Nueva Clase</h5>
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="small text-muted">Sede</label>
                    <select id="h-sede" class="form-select bg-dark text-white border-secondary"></select>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Día</label>
                    <select id="h-dia" class="form-select bg-dark text-white border-secondary">
                        <option value="Lunes">Lunes</option><option value="Martes">Martes</option>
                        <option value="Miércoles">Miércoles</option><option value="Jueves">Jueves</option>
                        <option value="Viernes">Viernes</option><option value="Sábado">Sábado</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="small text-muted">Hora de Inicio</label>
                    <input type="time" id="h-hora" class="form-control bg-dark text-white border-secondary">
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-tkd w-100" onclick="crearClase()">Publicar Horario</button>
                </div>
            </div>
        </div>

        <div id="horarios-grid" class="row g-4">
            <div class="text-center py-5"><div class="spinner-border text-orange"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app-horarios.js"></script>
</body>
</html>
