<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="security.js"></script> 
    <title>Elitec TKD - Gestión de Sedes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold text-danger"><i class="bi bi-yin-yang"></i> Elitec TKD</h4>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Inicio</a>
            <a class="nav-link" href="alumnos.html"><i class="bi bi-people"></i> Gestión Alumnos</a>
            <a class="nav-link active" href="sedes.html"><i class="bi bi-geo-alt"></i> Sedes</a>
            <a class="nav-link" href="horarios.html"><i class="bi bi-calendar3"></i> Mis Horarios</a>
            <a class="nav-link text-warning" href="perfil.html"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-4 border-top border-secondary">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-white">Sedes y Academias</h2>
            <button class="btn btn-tkd w-auto px-4" data-bs-toggle="modal" data-bs-target="#modalSede">
                <i class="bi bi-plus-circle"></i> + Nueva Sede
            </button>
        </div>

        <div id="sedes-list" class="row g-4">
            <div class="text-center mt-5"><div class="spinner-border text-danger"></div></div>
        </div>
    </div>

    <div class="modal fade" id="modalSede" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title fw-bold">📍 Datos de la Sede</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="formSede">
                        <input type="hidden" id="s_id">
                        <div class="mb-3">
                            <label>Nombre de la Sede</label>
                            <input type="text" id="s_nombre" class="form-control" placeholder="Ej: Sede Norte - Los Olivos" required>
                        </div>
                        <div class="mb-3">
                            <label>Dirección Exacta</label>
                            <input type="text" id="s_direccion" class="form-control" placeholder="Ej: Av. Las Palmeras 456" required>
                        </div>
                        <div class="mb-3">
                            <label>Instructor Encargado</label>
                            <input type="text" id="s_encargado" class="form-control" placeholder="Nombre del Sabonim">
                        </div>
                        <button type="button" class="btn btn-tkd w-100 mt-4 py-3 fw-bold" onclick="guardarSede()">ACTUALIZAR SEDE</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app-sedes.js"></script>
</body>
</html>
