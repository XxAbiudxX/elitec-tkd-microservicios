<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="security.js"></script> <title>Elitec TKD - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="sidebar d-flex flex-column" id="sidebar">
        <div class="sidebar-header">
            <h4 class="fw-bold text-danger"><i class="bi bi-yin-yang"></i> Elitec TKD</h4>
        </div>
        <nav class="nav flex-column mt-2">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Inicio</a>
            <div id="nav-admin-extras"></div> 
            <a class="nav-link" href="horarios.html"><i class="bi bi-calendar3"></i> Mis Horarios</a>
            <a class="nav-link active text-warning" href="perfil.html"><i class="bi bi-person-circle"></i> Mi Perfil</a>
        </nav>
        <div class="mt-auto p-4 border-top border-secondary">
            <button class="btn btn-outline-light w-100 btn-sm" onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </div>

    <div class="main-content">
        <div class="card-tkd p-0 overflow-hidden shadow-lg border-0">
            <div class="bg-danger p-4 d-flex align-items-center gap-4">
                <div class="bg-white rounded-circle p-1 shadow">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" class="rounded-circle shadow-sm" width="100" id="p-foto">
                </div>
                <div class="text-white">
                    <h2 class="mb-0 fw-bold" id="p-full-name">Cargando Nombre...</h2>
                    <span class="badge bg-dark mt-2" id="p-badge-rol">RANGO: ALUMNO</span>
                </div>
            </div>

            <div class="p-4 bg-dark">
                <h5 class="text-orange fw-bold mb-4 border-bottom border-secondary pb-2">DATOS GENERALES</h5>
                <div class="row g-4" id="perfil-grid">
                    <div class="col-12 text-center py-5"><div class="spinner-border text-danger"></div></div>
                </div>

                <hr class="border-secondary my-4">
                
                <div class="card bg-secondary bg-opacity-10 border-0 p-3">
                    <h6 class="text-white mb-3">Actualizar Información de Contacto</h6>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="small text-muted">Teléfono / Celular</label>
                            <input type="text" id="edit-tel" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-6">
                            <label class="small text-muted">Dirección Actual</label>
                            <input type="text" id="edit-dir" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-tkd w-auto px-4 mt-2" onclick="actualizarDatos()">
                                <i class="bi bi-save"></i> Guardar Cambios
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app-perfil.js"></script>
</body>
</html>
